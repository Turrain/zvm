name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - name: Smoke test
        run: |
          ./zig-out/bin/zvm --version
          ./zig-out/bin/zvm help
          ./zig-out/bin/zvm env --json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cross-compile for all targets
        run: |
          set -eu
          mkdir -p dist
          for target in \
            x86_64-linux \
            aarch64-linux \
            riscv64-linux \
            x86_64-macos \
            aarch64-macos \
            x86_64-windows \
            aarch64-windows; do
            echo "::group::Building $target"
            zig build -Doptimize=ReleaseSafe -Dtarget=$target
            case "$target" in
              *windows*)
                ( cd zig-out/bin && zip -q "$GITHUB_WORKSPACE/dist/zvm-$target.zip" zvm.exe zvm-proxy.exe )
                ;;
              *)
                tar -czf "dist/zvm-$target.tar.gz" -C zig-out/bin zvm zvm-proxy
                ;;
            esac
            rm -rf zig-out
            echo "::endgroup::"
          done

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
