name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - name: Smoke test
        run: |
          ./zig-out/bin/zvm --version
          ./zig-out/bin/zvm help
          ./zig-out/bin/zvm env --json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux
          - os: macos-latest
            target: x86_64-macos
          - os: macos-latest
            target: aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build release
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}
          tar -czf zvm-${{ matrix.target }}.tar.gz -C zig-out/bin zvm zvm-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zvm-${{ matrix.target }}
          path: zvm-${{ matrix.target }}.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: zvm-${{ matrix.target }}.tar.gz
